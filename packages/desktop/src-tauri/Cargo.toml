[package]
name = "mymind"
version = "1.0.0"
description = "MyMind desktop"
authors = ["MyMind"]
edition = "2021"

[lib]
name = "mymind_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
